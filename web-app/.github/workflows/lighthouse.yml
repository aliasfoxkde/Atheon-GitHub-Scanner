name: Lighthouse CI

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'vite.config.js'
      - '.github/workflows/lighthouse.yml'
      - '.lighthouserc.json'
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'vite.config.js'
      - '.lighthouserc.json'

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://atheon-scanner.pages.dev/
            https://atheon-scanner.pages.dev/reports
            https://atheon-scanner.pages.dev/trending
            https://atheon-scanner.pages.dev/submit
            https://atheon-scanner.pages.dev/settings
          budgetPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
